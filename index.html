<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>'יהיה בסדר' - מחולל טקסטורות</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            font-weight: 600;
            background-color: #B8B9BB; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h2 { 
            color: #1a1a1a; 
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 600;
        }
        input {
            font-family: 'Assistant', sans-serif;
            font-weight: 600;
            width: 100%;
            padding: 12px;
            font-size: 16px; 
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 25px;
            outline: none;
            box-sizing: border-box;
            text-align: center;
        }
        #stripes-container {
            width: 100%;
            height: 400px; 
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #ddd;
        }
        .stripe {
            width: 100%;
            flex-grow: 1; 
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 25px;
        }
        button {
            font-family: 'Assistant', sans-serif;
            font-weight: 600;
            padding: 15px 30px;
            font-size: 15px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        #saveBtn {
            background-color: #000;
            color: white;
        }
        #shareBtn {
            background-color: #fff;
            color: #000;
            border: 2px solid #000;
        }
        button:hover { 
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>'יהיה בסדר'</h2>
    <input type="text" id="textInput" placeholder="הקלידו כאן..." autocomplete="off">
    <div id="stripes-container"></div>
    
    <div class="button-group">
        <button id="saveBtn">Save Image</button>
        <button id="shareBtn">Share</button>
    </div>
</div>

<script>
    // שחזור צבעי הקוד המקוריים לכל אות
    const colorMap = {
        'א': '#efefef', 'ב': '#0f02e8', 'ג': '#f2a20f', 'ד': '#f44ff1', 
        'ה': '#c3c2c0', 'ו': '#101010', 'ז': '#de733f', 'ח': '#16116b', 
        'ט': '#4c07c4', 'י': '#111119', 'כ': '#6a6869', 'ך': '#6a6869',
        'ל': '#f9e8a2', 'מ': '#fff500', 'ם': '#fff500', 'נ': '#eca620',
        'ן': '#eca620', 'ס': '#714c18', 'ע': '#fe0003', 'פ': '#2ef538',
        'ף': '#2ef538', 'צ': '#ff1e00', 'ץ': '#ff1e00', 'ק': '#72593a',
        'ר': '#019909', 'ש': '#105c14', 'ת': '#58d6ff', ' ': '#FFFFFF'
    };

    const input = document.getElementById('textInput');
    const container = document.getElementById('stripes-container');
    const saveBtn = document.getElementById('saveBtn');
    const shareBtn = document.getElementById('shareBtn');

    function generateCanvas() {
        const stripes = container.querySelectorAll('.stripe');
        if (stripes.length === 0) return null;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1024; 
        canvas.height = 1024;
        const stripeHeight = canvas.height / stripes.length;

        stripes.forEach((stripe, i) => {
            ctx.fillStyle = stripe.style.backgroundColor;
            ctx.fillRect(0, i * stripeHeight, canvas.width, stripeHeight);
        });
        return canvas;
    }

    input.addEventListener('input', (e) => {
        const text = e.target.value;
        container.innerHTML = ''; 
        for (let char of text) {
            if (colorMap[char]) {
                const stripe = document.createElement('div');
                stripe.className = 'stripe';
                stripe.style.backgroundColor = colorMap[char];
                container.appendChild(stripe);
            }
        }
    });

    saveBtn.addEventListener('click', () => {
        const canvas = generateCanvas();
        if (!canvas) return;
        const link = document.createElement('a');
        link.download = 'texture.png';
        link.href = canvas.toDataURL();
        link.click();
    });

    shareBtn.addEventListener('click', async () => {
        const canvas = generateCanvas();
        if (!canvas) return;

        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'texture.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: "'יהיה בסדר' - טקסטורה צבעונית",
                        text: "תראו מה יצרתי עם מחולל הטקסטורות שלי!"
                    });
                } catch (err) {
                    console.error('Error sharing:', err);
                }
            } else {
                alert('השיתוף נתמך רק בדפדפנים מודרניים (בעיקר בנייד). בינתיים אפשר להשתמש בכפתור השמירה.');
            }
        });
    });
</script>

</body>
</html>
